<!-- =========================================================================
     STRUTTURA DI ANTEPRIMA E LOGICA GENERALE (DA LASCIARE IN FONDO)
     ========================================================================= -->

<!-- Il Contenitore della Preview (Overlay) -->
<div id="pdf-preview-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); z-index: 99999; justify-content: center; align-items: center;">
  
  <!-- Pulsante X di Chiusura -->
  <button id="close-preview-btn" style="position: absolute; top: 20px; right: 20px; background-color: #ff4444; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 24px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
    &times;
  </button>
  
  <!-- Finestra Iframe per visualizzare il PDF -->
  <iframe id="pdf-preview-iframe" src="" style="width: 90%; height: 85%; border: 2px solid #3a3a45; border-radius: 8px; background-color: #fff;"></iframe>
</div>

<!-- Logica di Controllo JavaScript -->
<script>
  // Funzione globale attivata direttamente dai link
  function apriPreview(url) {
    const overlay = document.getElementById("pdf-preview-overlay");
    const iframe = document.getElementById("pdf-preview-iframe");
    
    // Inietta l'URL corretto e mostra lo schermo intero
    iframe.src = url;
    overlay.style.display = "flex";
    document.body.style.overflow = "hidden"; // Blocca lo scroll della tierlist sotto
  }

  // Funzione per ripulire e nascondere la finestra
  function chiudiPreview() {
    const overlay = document.getElementById("pdf-preview-overlay");
    const iframe = document.getElementById("pdf-preview-iframe");
    
    overlay.style.display = "none";
    iframe.src = ""; // Svuota la memoria del browser
    document.body.style.overflow = "auto"; // Riattiva lo scroll della pagina
  }

  // Assicura l'attivazione dei pulsanti di chiusura al caricamento della pagina
  document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("close-preview-btn").addEventListener("click", chiudiPreview);
    
    // Se l'utente clicca fuori dal PDF (sullo sfondo scuro), chiude la finestra
    document.getElementById("pdf-preview-overlay").addEventListener("click", function(e) {
      if (e.target === this) chiudiPreview();
    });
  });
</script>
